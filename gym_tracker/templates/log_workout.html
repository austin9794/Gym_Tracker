{% extends "base.html" %}
{% block title %}Log Workout — GymTrack{% endblock %}
{% block content %}

<div class="page-title">LOG <span>WORKOUT</span></div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('log_workout') }}">
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" value="{{ today }}" required>
        </div>
        <div class="form-group">
            <label>Exercise</label>
            <input type="text" name="exercise" placeholder="e.g. Bench Press, Squat, Deadlift" required autocomplete="off">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Sets</label>
                <input type="number" name="sets" placeholder="4" min="1">
            </div>
            <div class="form-group">
                <label>Reps</label>
                <input type="number" name="reps" placeholder="8" min="1">
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" name="weight_kg" placeholder="80" step="0.5" min="0">
            </div>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="2" placeholder="PR? How did it feel?"></textarea>
        </div>
        <div class="actions">
            <button class="btn" type="submit">Save Workout</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
