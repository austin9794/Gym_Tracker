<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GymTrack{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: #222222;
            --accent: #e8ff47;
            --accent2: #ff6b35;
            --text: #f0f0f0;
            --muted: #666666;
            --success: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 64px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .logo span { color: var(--text); }

        nav ul {
            display: flex;
            gap: 0.5rem;
            list-style: none;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
            letter-spacing: 0.3px;
        }

        nav a:hover { color: var(--text); background: var(--surface2); }
        nav a.active { color: var(--accent); }

        .main { padding: 2.5rem 2rem; max-width: 1200px; margin: 0 auto; }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            line-height: 1;
        }

        .page-title span { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }

        .stat-big {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            line-height: 1;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.25rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 0 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        tr:last-child td { border-bottom: none; }
        td.accent { color: var(--accent); font-weight: 600; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: var(--surface2);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .badge.pr { background: rgba(232, 255, 71, 0.1); color: var(--accent); }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        input, textarea, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s;
            outline: none;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.15s;
            text-decoration: none;
        }
        .btn:hover { background: #d4eb30; transform: translateY(-1px); }
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface2); color: var(--text); transform: none; }

        .pr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.75rem;
        }

        .pr-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
        }

        .pr-item .ex-name {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }

        .pr-item .ex-weight {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .pr-item .ex-unit {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .chart-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            margin-left: auto;
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-header .card-title { margin-bottom: 0; }

        .form-card {
            max-width: 600px;
        }

        .actions { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Gym<span>Track</span></div>
        <ul>
            <li><a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="{{ url_for('log_workout') }}" {% if request.endpoint == 'log_workout' %}class="active"{% endif %}>Log Workout</a></li>
            <li><a href="{{ url_for('log_stats') }}" {% if request.endpoint == 'log_stats' %}class="active"{% endif %}>Log Stats</a></li>
            <li><a href="{{ url_for('history') }}" {% if request.endpoint == 'history' %}class="active"{% endif %}>History</a></li>
            <li><a href="{{ url_for('weekly') }}" {% if request.endpoint == 'weekly' %}class="active"{% endif %}>Weekly</a></li>
            <li><a href="{{ url_for('goals') }}" {% if request.endpoint == 'goals' %}class="active"{% endif %}>Goals</a></li>
        </ul>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
